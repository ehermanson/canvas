name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vite+
        run: npm install -g vite-plus@latest

      - name: Install dependencies
        run: vp install

      - name: Check
        run: vp check

      - name: Test (unit)
        run: vp test

      - name: Build
        run: vp run -r build
